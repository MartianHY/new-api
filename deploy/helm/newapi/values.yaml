replicaCount: 1

image:
  registry: ""
  repository: new-api
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: new-api.example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

command: []
args:
  - --log-dir
  - /app/logs

env:
  TZ: Asia/Shanghai
  GIN_MODE: release
  PORT: "3000"
  ERROR_LOG_ENABLED: "true"
  BATCH_UPDATE_ENABLED: "true"
  NODE_NAME: new-api
  SESSION_COOKIE_NAME: newapi_session
  CMDB_AUTH_ENABLED: "true"
  CMDB_AUTH_HEADER: Access-Token
  CMDB_AUTH_COOKIE: token
  CMDB_AUTH_ALLOW_AUTHORIZATION: "true"
  CMDB_AUTH_MATCH_USERNAME: "false"
  CMDB_AUTH_USERINFO_URL: ""

extraEnv: []

secret:
  create: true
  existingSecret: ""
  sessionSecret: ""
  cryptoSecret: ""
  cmdbJwtSecret: "change-me"
  sqlDsn: ""
  redisConnString: ""

database:
  type: postgresql
  sqlite:
    path: /data/new-api.db
  postgresql:
    builtIn: true
    host: ""
    port: 5432
    database: new-api
    user: root
    password: "123456"
    sslMode: disable
    image:
      registry: registry-1.docker.io
      repository: bitnami/postgresql
      tag: latest-tz
      pullPolicy: IfNotPresent
    podSecurityContext:
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
    volumePermissions:
      enabled: true
      image:
        registry: registry-1.docker.io
        repository: bitnami/os-shell
        tag: latest
        pullPolicy: IfNotPresent
      securityContext:
        runAsUser: 0
    persistence:
      enabled: true
      existingClaim: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
      storageClassName: ""
      annotations: {}
    resources: {}
  mysql:
    builtIn: false
    host: ""
    port: 3306
    database: new-api
    user: root
    password: "123456"
    image:
      registry: docker.io
      repository: library/mysql
      tag: "8.0"
      pullPolicy: IfNotPresent
    persistence:
      enabled: true
      existingClaim: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
      storageClassName: ""
      annotations: {}
    resources: {}

redis:
  enabled: true
  builtIn: true
  host: ""
  port: 6379
  password: "123456"
  database: 0
  image:
    registry: docker.io
    repository: library/redis
    tag: "7"
    pullPolicy: IfNotPresent
  persistence:
    enabled: false
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    storageClassName: ""
    annotations: {}
  resources: {}

persistence:
  data:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClassName: ""
    annotations: {}
  logs:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClassName: ""
    annotations: {}

livenessProbe:
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
