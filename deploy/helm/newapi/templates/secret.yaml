{{- if and .Values.secret.create (not .Values.secret.existingSecret) -}}
{{- $secretName := include "new-api.secretName" . -}}
{{- $sessionSecret := .Values.secret.sessionSecret -}}
{{- if not $sessionSecret -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if and $existingSecret (index $existingSecret.data "SESSION_SECRET") -}}
{{- $sessionSecret = (index $existingSecret.data "SESSION_SECRET" | b64dec) -}}
{{- else -}}
{{- $sessionSecret = randAlphaNum 48 -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "new-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SECRET: {{ $sessionSecret | quote }}
  {{- if .Values.secret.cryptoSecret }}
  CRYPTO_SECRET: {{ .Values.secret.cryptoSecret | quote }}
  {{- end }}
  {{- if .Values.secret.cmdbJwtSecret }}
  CMDB_JWT_SECRET: {{ .Values.secret.cmdbJwtSecret | quote }}
  {{- end }}
  {{- if ne .Values.database.type "sqlite" }}
  SQL_DSN: {{ include "new-api.sqlDsn" . | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_CONN_STRING: {{ include "new-api.redisConnString" . | quote }}
  {{- end }}
  {{- if and (eq .Values.database.type "postgresql") .Values.database.postgresql.builtIn }}
  POSTGRES_PASSWORD: {{ .Values.database.postgresql.password | quote }}
  {{- end }}
  {{- if and (eq .Values.database.type "mysql") .Values.database.mysql.builtIn }}
  MYSQL_ROOT_PASSWORD: {{ .Values.database.mysql.password | quote }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.builtIn .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}
{{- end }}
